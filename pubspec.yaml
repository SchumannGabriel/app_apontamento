name: registro_producao_app
description: Sistema de apontamento de produção industrial
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8


  firebase_core: ^2.30.0
  cloud_firestore: ^4.15.0
  firebase_auth: ^4.17.0


  intl: ^0.19.0

  
  connectivity_plus: ^6.0.3


  
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo_pro.png
    - assets/logo.png


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_app1.png"

  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo_app1.png"